<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Scout</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="../src/app/globals.css">
  <style>
    /* Dashboard-specific styles */
    .dashboard-container {
      padding: 20px 28px 40px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .dashboard-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .dashboard-title-group h1 {
      font-size: 24px;
      font-weight: 500;
      margin-bottom: 4px;
      letter-spacing: -0.02em;
    }

    .dashboard-subtitle {
      font-size: 13px;
      color: var(--s-text-secondary);
    }

    .time-range-selector {
      display: flex;
      gap: 4px;
      background: var(--s-surface);
      border: 0.5px solid var(--s-border);
      border-radius: var(--s-radius-md);
      padding: 4px;
    }

    .time-range-btn {
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 500;
      border: none;
      background: transparent;
      color: var(--s-text-secondary);
      border-radius: var(--s-radius-sm);
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }

    .time-range-btn:hover {
      color: var(--s-text);
      background: var(--s-surface-alt);
    }

    .time-range-btn.active {
      background: var(--scout-accent);
      color: white;
    }

    .dashboard-tabs {
      display: flex;
      gap: 0;
      border-bottom: 0.5px solid var(--s-border);
      margin-bottom: 24px;
    }

    .dashboard-tab {
      padding: 10px 16px;
      font-size: 13px;
      color: var(--s-text-secondary);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.12s;
      background: none;
      border-left: none;
      border-right: none;
      border-top: none;
      font-family: inherit;
      font-weight: 400;
    }

    .dashboard-tab:hover {
      color: var(--s-text);
    }

    .dashboard-tab.active {
      color: var(--scout-accent-800);
      border-bottom-color: var(--scout-accent);
      font-weight: 500;
    }

    /* Main grid: 3 top KPIs + Traffic detail card */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 20px;
    }

    .kpi-card {
      background: var(--s-surface);
      border: 0.5px solid var(--s-border);
      border-radius: var(--s-radius-lg);
      padding: 20px;
      transition: border-color 0.15s, box-shadow 0.15s;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      min-height: 220px;
    }

    .kpi-card:hover {
      border-color: var(--scout-accent);
      box-shadow: 0 2px 8px rgba(55, 138, 221, 0.08);
    }

    .kpi-label {
      font-size: 11px;
      color: var(--s-text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 500;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .kpi-value-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 6px;
    }

    .kpi-value {
      font-size: 36px;
      font-weight: 600;
      color: var(--s-text);
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    .kpi-trend {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 13px;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    .kpi-trend.positive {
      color: var(--s-success);
    }

    .kpi-trend.negative {
      color: var(--s-danger);
    }

    .kpi-trend.neutral {
      color: var(--s-text-tertiary);
    }

    .kpi-trend svg {
      width: 14px;
      height: 14px;
    }

    .kpi-meta {
      font-size: 12px;
      color: var(--s-text-tertiary);
    }

    .kpi-sparkline {
      height: 60px;
      margin-top: auto;
      padding-top: 16px;
      flex: 1;
      min-height: 60px;
      margin-left: -20px;
      margin-right: -20px;
      margin-bottom: -20px;
      padding-left: 20px;
      padding-right: 20px;
      padding-bottom: 20px;
      width: calc(100% + 40px);
    }
    
    .kpi-sparkline svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .kpi-sparkline svg {
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
    }

    .kpi-threshold {
      font-size: 11px;
      color: var(--s-text-tertiary);
      margin-top: 0;
      margin-left: -20px;
      margin-right: -20px;
      margin-bottom: -20px;
      padding: 12px 20px;
      border-top: 0.5px solid var(--s-border);
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
      background: var(--s-surface-alt);
    }

    .kpi-threshold svg {
      width: 12px;
      height: 12px;
      opacity: 0.5;
    }

    .kpi-badge {
      display: inline-flex;
      padding: 2px 7px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 600;
      background: var(--s-danger-bg);
      color: var(--s-danger-text);
      margin-left: auto;
    }

    /* User Breakdown */
    .user-breakdown {
      margin-top: 16px;
      margin-bottom: 16px;
    }

    .user-breakdown-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      margin-bottom: 6px;
    }

    .user-breakdown-label {
      color: var(--s-text-secondary);
    }

    .user-breakdown-value {
      font-weight: 600;
      color: var(--s-text);
      font-variant-numeric: tabular-nums;
    }

    .user-breakdown-bar {
      height: 24px;
      border-radius: 4px;
      overflow: hidden;
      display: flex;
      margin: 8px 0;
    }

    .user-breakdown-segment {
      height: 100%;
    }

    .user-breakdown-segment.new {
      background: #0EA5E9;
    }

    .user-breakdown-segment.returning {
      background: #888780;
    }

    /* Section Labels */
    .kpi-section-label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      font-size: 13px;
      font-weight: 600;
      color: var(--s-text-secondary);
    }

    .kpi-section-label svg {
      width: 16px;
      height: 16px;
      opacity: 0.6;
    }

    /* KPI Header Row - Icon next to title */
    .kpi-header-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 8px;
    }

    .kpi-icon-large {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .kpi-icon-large svg {
      width: 20px;
      height: 20px;
    }

    .search-icon {
      background: #059669;
      color: white;
    }

    .traffic-icon {
      background: #0EA5E9;
      color: white;
    }

    .kpi-header-content {
      flex: 1;
      min-width: 0;
    }

    /* Traffic Sources Card */
    .traffic-sources-card {
      background: var(--s-surface);
      border: 0.5px solid var(--s-border);
      border-radius: var(--s-radius-lg);
      padding: 24px;
      margin-bottom: 20px;
    }

    .traffic-sources-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .traffic-sources-title {
      font-size: 16px;
      font-weight: 600;
    }

    .traffic-link {
      font-size: 13px;
      color: var(--scout-accent);
      text-decoration: none;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .traffic-link:hover {
      text-decoration: underline;
    }

    .traffic-sources-bar {
      display: flex;
      height: 48px;
      border-radius: var(--s-radius-md);
      overflow: hidden;
      margin-bottom: 20px;
    }

    .traffic-source-segment {
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.15s;
      position: relative;
    }

    .traffic-source-segment:hover {
      opacity: 0.9;
    }

    .segment-label {
      font-size: 12px;
      font-weight: 600;
      color: white;
      text-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }

    .traffic-sources-legend {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .traffic-source-legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .traffic-source-color {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .traffic-source-name {
      font-size: 13px;
      color: var(--s-text-secondary);
      flex: 1;
    }

    .traffic-source-stats {
      font-size: 13px;
      font-weight: 600;
      color: var(--s-text);
      font-variant-numeric: tabular-nums;
    }

    /* Alerts section */
    .alerts-section {
      background: var(--s-surface);
      border: 0.5px solid var(--s-border);
      border-radius: var(--s-radius-lg);
      padding: 24px;
    }

    .alerts-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .alerts-title {
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .alerts-count {
      display: inline-flex;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      background: var(--s-danger-bg);
      color: var(--s-danger-text);
    }

    .alerts-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .alert-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px;
      border-radius: var(--s-radius-md);
      border-left: 3px solid var(--s-danger);
    }

    .alert-item.warning {
      border-left-color: #D97706;
    }

    .alert-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .alert-item.warning .alert-icon {
      color: #D97706;
    }

    /* Tables Grid */
    .tables-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .table-card {
      background: var(--s-surface);
      border: 0.5px solid var(--s-border);
      border-radius: var(--s-radius-lg);
      overflow: hidden;
    }

    .table-header {
      padding: 20px 24px;
      border-bottom: 0.5px solid var(--s-border);
    }

    .table-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--s-text);
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
    }

    .data-table thead {
      border-bottom: 1px solid var(--s-border);
    }

    .data-table th {
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: #888780;
      padding: 10px 24px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .data-table tbody tr {
      border-top: 0.5px solid var(--s-border);
    }

    .data-table tbody tr:hover {
      background: var(--s-surface-alt);
    }

    .data-table td {
      padding: 14px 24px;
      font-size: 14px;
      color: var(--s-text);
      font-variant-numeric: tabular-nums;
    }

    .data-table td:first-child {
      font-weight: 500;
    }

    .data-table td:not(:first-child) {
      color: var(--s-text-secondary);
    }

    /* Searches without results */
    .searches-without-results-card {
      background: var(--s-surface);
      border: 0.5px solid var(--s-border);
      border-radius: var(--s-radius-lg);
      padding: 24px;
      margin-bottom: 24px;
    }

    .searches-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 20px;
      gap: 20px;
    }

    .searches-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .searches-subtitle {
      font-size: 13px;
      color: var(--s-text-secondary);
      line-height: 1.5;
    }

    .time-range-dropdown {
      padding: 6px 12px;
      border: 0.5px solid var(--s-border);
      border-radius: var(--s-radius-md);
      background: var(--s-surface);
      color: var(--s-text);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      min-width: 120px;
    }

    .time-range-dropdown:hover {
      border-color: var(--s-border-strong);
    }

    .searches-table {
      width: 100%;
      border-collapse: collapse;
    }

    .searches-table thead {
      border-bottom: 1px solid var(--s-border);
    }

    .searches-table th {
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: #888780;
      padding: 10px 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .searches-table tbody tr {
      border-top: 0.5px solid var(--s-border);
    }

    .searches-table tbody tr:hover {
      background: var(--s-surface-alt);
    }

    .searches-table td {
      padding: 12px;
      font-size: 14px;
      color: var(--s-text);
    }

    .search-term {
      font-weight: 500;
    }

    .btn-add-synonym {
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 500;
      color: var(--s-text);
      background: var(--s-surface);
      border: 0.5px solid var(--s-border);
      border-radius: var(--s-radius-md);
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .btn-add-synonym:hover {
      background: var(--s-surface-alt);
      border-color: var(--s-border-strong);
    }

    .alert-item.critical .alert-icon {
      color: var(--s-danger);
    }

    .alert-content {
      flex: 1;
    }

    .alert-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--s-text);
      margin-bottom: 4px;
    }

    .alert-description {
      font-size: 12px;
      color: var(--s-text-secondary);
    }

    .alert-time {
      font-size: 11px;
      color: var(--s-text-muted);
      white-space: nowrap;
    }

    .alerts-empty {
      text-align: center;
      padding: 32px 20px;
    }

    .alerts-empty-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 12px;
      color: var(--s-text-muted);
      opacity: 0.4;
    }

    .alerts-empty-text {
      font-size: 13px;
      color: var(--s-text-tertiary);
    }

    /* Mobile responsive */
    @media (max-width: 768px) {
      .kpi-grid {
        grid-template-columns: 1fr;
      }

      .traffic-grid {
        grid-template-columns: 1fr;
      }

      .alert-tiles {
        grid-template-columns: 1fr;
      }

      .dashboard-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="s-app">
    <!-- Sidebar navigation -->
    <nav class="s-nav">
      <div class="s-brand">
        <div class="s-brand-mark"></div>
        <div class="s-brand-name">Scout</div>

      <div class="s-nav-section">Principal</div>
      <a href="Dashboard Landing.html" class="s-nav-item active">
        <svg class="s-nav-icon" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />

    <!-- Main content -->
    <main class="s-main">
      <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Generate sparkline data for "active now" widget
    const generateSparklineData = () => {
      const data = [];
      for (let i = 9; i >= 0; i--) {
        data.push({
          value: Math.floor(8 + Math.random() * 5)
        });
      }
      return data;
    };

    const DashboardLanding = () => {
      const [activeTab, setActiveTab] = useState('resumen');
      const [timeRange, setTimeRange] = useState('7d');
      const [sparklineData] = useState(generateSparklineData());
      const [activeNow, setActiveNow] = useState(12);
      const [lastUpdate, setLastUpdate] = useState(0);

      // Simulate live updates every 30s
      useEffect(() => {
        const interval = setInterval(() => {
          setActiveNow(prev => Math.max(5, prev + Math.floor(Math.random() * 3) - 1));
          setLastUpdate(0);
        }, 30000);
        return () => clearInterval(interval);
      }, []);

      // Update timestamp
      useEffect(() => {
        const interval = setInterval(() => {
          setLastUpdate(prev => prev + 1);
        }, 1000);
        return () => clearInterval(interval);
      }, []);

      return (
        <div className="dashboard-container">
          <div className="dashboard-header">
            <div className="dashboard-title-group">
              <h1>Dashboard</h1>
              <div className="dashboard-subtitle">Resumen de actividad y alertas</div>
            </div>
            <div className="time-range-selector">
              <button 
                className={`time-range-btn ${timeRange === 'hoy' ? 'active' : ''}`}
                onClick={() => setTimeRange('hoy')}
              >
                Hoy
              </button>
              <button 
                className={`time-range-btn ${timeRange === 'ayer' ? 'active' : ''}`}
                onClick={() => setTimeRange('ayer')}
              >
                Ayer
              </button>
              <button 
                className={`time-range-btn ${timeRange === '7d' ? 'active' : ''}`}
                onClick={() => setTimeRange('7d')}
              >
                7 días
              </button>
              <button 
                className={`time-range-btn ${timeRange === '30d' ? 'active' : ''}`}
                onClick={() => setTimeRange('30d')}
              >
                30 días
              </button>
            </div>
          </div>

          <div className="dashboard-tabs">
            <button 
              className={`dashboard-tab ${activeTab === 'resumen' ? 'active' : ''}`}
              onClick={() => setActiveTab('resumen')}
            >
              Resumen
            </button>
            <button 
              className={`dashboard-tab ${activeTab === 'otros' ? 'active' : ''}`}
              onClick={() => setActiveTab('otros')}
            >
              Otros indicadores
            </button>
          </div>

          {activeTab === 'resumen' && (
            <>
              {/* Alerts at the top */}
              <div className="alerts-section">
                <div className="alerts-header">
