<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tráfico y Engagement — Scout Dashboard</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="../src/app/globals.css">
  <style>
    .dashboard-container {
      padding: 20px 28px 40px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .dashboard-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .dashboard-title-group h1 {
      font-size: 24px;
      font-weight: 500;
      margin-bottom: 4px;
      letter-spacing: -0.02em;
    }

    .dashboard-subtitle {
      font-size: 13px;
      color: var(--s-text-secondary);
    }

    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--s-text-tertiary);
      margin-bottom: 8px;
    }

    .breadcrumb a {
      color: var(--s-text-secondary);
      text-decoration: none;
    }

    .breadcrumb a:hover {
      color: var(--scout-accent);
    }

    .breadcrumb-sep {
      color: var(--s-text-muted);
    }

    /* Empty state */
    .empty-state-container {
      background: var(--s-surface);
      border: 0.5px solid var(--s-border);
      border-radius: var(--s-radius-lg);
      padding: 80px 40px;
      text-align: center;
      max-width: 600px;
      margin: 60px auto;
    }

    .empty-state-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      color: var(--scout-accent);
      opacity: 0.4;
    }

    .empty-state-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--s-text);
      margin-bottom: 12px;
    }

    .empty-state-description {
      font-size: 14px;
      color: var(--s-text-secondary);
      line-height: 1.6;
      margin-bottom: 32px;
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
    }

    .empty-state-benefits {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-bottom: 32px;
      text-align: left;
    }

    .benefit-item {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .benefit-icon {
      width: 20px;
      height: 20px;
      color: var(--scout-accent);
      flex-shrink: 0;
      margin-top: 2px;
    }

    .benefit-content {
      flex: 1;
    }

    .benefit-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--s-text);
      margin-bottom: 4px;
    }

    .benefit-description {
      font-size: 12px;
      color: var(--s-text-secondary);
      line-height: 1.5;
    }

    .empty-state-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 500;
      background: var(--scout-accent);
      color: white;
      border: none;
      border-radius: var(--s-radius-md);
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
      text-decoration: none;
    }

    .empty-state-cta:hover {
      background: var(--scout-accent-hover);
    }

    .empty-state-cta svg {
      width: 18px;
      height: 18px;
    }

    .empty-state-help {
      margin-top: 24px;
      font-size: 12px;
      color: var(--s-text-tertiary);
    }

    .empty-state-help a {
      color: var(--scout-accent);
      text-decoration: none;
      font-weight: 500;
    }

    .empty-state-help a:hover {
      text-decoration: underline;
    }

    @media (max-width: 768px) {
      .empty-state-container {
        padding: 60px 24px;
        margin: 40px 20px;
      }

      .empty-state-benefits {
        grid-template-columns: 1fr;
      }

      .dashboard-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="s-app">
    <!-- Sidebar navigation -->
    <nav class="s-nav">
      <div class="s-brand">
        <div class="s-brand-mark"></div>
        <div class="s-brand-name">Scout</div>
      </div>

      <div class="s-nav-section">Principal</div>
      <a href="Dashboard Landing.html" class="s-nav-item active">
        <svg class="s-nav-icon" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
        </svg>
        Dashboard
      </a>
      
      <div class="s-nav-section">Catálogo</div>
      <a href="#" class="s-nav-item">
        <svg class="s-nav-icon" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
        </svg>
        Productos
      </a>
      <a href="#" class="s-nav-item">
        <svg class="s-nav-icon" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z" />
        </svg>
        Categorías
      </a>
      
      <div class="s-nav-section">Operaciones</div>
      <a href="#" class="s-nav-item">
        <svg class="s-nav-icon" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        Precios
      </a>
      <a href="#" class="s-nav-item">
        <svg class="s-nav-icon" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
        </svg>
        Sincronización
      </a>
      
      <div class="s-nav-section">Configuración</div>
      <a href="GA4 Configuration.html" class="s-nav-item">
        <svg class="s-nav-icon" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
          <path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
        Integraciones
      </a>
    </nav>

    <!-- Main content -->
    <main class="s-main">
      <div id="root"></div>
    </main>
  </div>

  <script type="text/babel">
    const TrafficEmptyState = () => {
      return (
        <div className="dashboard-container">
          <div className="breadcrumb">
            <a href="Dashboard Landing.html">Dashboard</a>
            <span className="breadcrumb-sep">›</span>
            <span>Tráfico y engagement</span>
          </div>

          <div className="dashboard-header">
            <div className="dashboard-title-group">
              <h1>Tráfico y Engagement</h1>
              <div className="dashboard-subtitle">Conecta Google Analytics 4 para ver métricas</div>
            </div>
          </div>

          <div className="empty-state-container">
            <svg className="empty-state-icon" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
              <path strokeLinecap="round" strokeLinejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
            </svg>

            <div className="empty-state-title">
              Conecta Google Analytics para monitorear tu tráfico
            </div>

            <div className="empty-state-description">
              Obtén visibilidad completa del comportamiento de tus clientes: sesiones, engagement, fuentes de tráfico y alertas automáticas cuando algo necesite tu atención.
            </div>

            <div className="empty-state-benefits">
              <div className="benefit-item">
                <svg className="benefit-icon" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                  <path strokeLinecap="round" strokeLinejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                </svg>
                <div className="benefit-content">
                  <div className="benefit-title">Monitoreo en tiempo real</div>
                  <div className="benefit-description">Ve cuántos usuarios están activos ahora mismo en tu tienda</div>
                </div>
              </div>

              <div className="benefit-item">
                <svg className="benefit-icon" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
                <div className="benefit-content">
                  <div className="benefit-title">Alertas automáticas</div>
                  <div className="benefit-description">Te avisamos cuando las sesiones caen o hay cambios importantes</div>
                </div>
              </div>

              <div className="benefit-item">
                <svg className="benefit-icon" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z" />
                </svg>
                <div className="benefit-content">
                  <div className="benefit-title">Tendencias visuales</div>
                  <div className="benefit-description">Gráficos de sesiones y engagement de los últimos 14 días</div>
                </div>
              </div>

              <div className="benefit-item">
                <svg className="benefit-icon" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
                </svg>
                <div className="benefit-content">
                  <div className="benefit-title">Fuentes de tráfico</div>
                  <div className="benefit-description">Descubre de dónde vienen tus visitantes (búsqueda, redes, directo)</div>
                </div>
              </div>
            </div>

            <a href="GA4 Configuration.html" className="empty-state-cta">
              <svg fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
              </svg>
              Conectar Google Analytics
            </a>

            <div className="empty-state-help">
              ¿Necesitas ayuda? <a href="#">Lee la guía de configuración</a>
            </div>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<TrafficEmptyState />);
  </script>
</body>
</html>
