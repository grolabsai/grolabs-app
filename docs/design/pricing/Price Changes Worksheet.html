    :root {

      --rre-accent-hover: #185FA5;
      --rre-accent-50: #E6F1FB;
      --rre-accent-100: #B5D4F4;
      --rre-accent-600: #185FA5;
      --rre-accent-800: #0C447C;
      --s-bg: #FAFAF9;
      --s-surface: #FFFFFF;
      --s-surface-alt: #F5F5F4;
      --s-surface-hover: #EFEFEE;
      --s-border: rgba(0, 0, 0, 0.08);
      --s-border-strong: rgba(0, 0, 0, 0.16);
      --s-text: #1A1A1A;
      --s-text-secondary: #5F5E5A;
      --s-text-tertiary: #888780;
      --s-text-muted: #B4B2A9;
      --s-success: #1D9E75;
      --s-success-bg: #E1F5EE;
      --s-success-text: #085041;
      --s-danger: #A32D2D;
      --s-danger-bg: #FCEBEB;
      --s-danger-text: #501313;

      --s-radius-md: 8px;
      --s-radius-lg: 12px;
      --s-radius-xl: 16px;
      --s-font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
      --s-font-mono: ui-monospace, "SF Mono", "Cascadia Code", Menlo, monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body, #root {
      height: 100%;
      font-family: var(--s-font);
      font-size: 13px;
      color: var(--s-text);
      background: var(--s-bg);
      -webkit-font-smoothing: antialiased;
      line-height: 1.5;
    }

    .app-shell {
      display: flex;
      height: 100vh;
      position: relative;
    }

    .main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      overflow: hidden;
    }

    .agent-panel-overlay {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: 360px;
      background: var(--s-surface);
      border-left: 0.5px solid var(--s-border);
      box-shadow: -4px 0 24px rgba(0, 0, 0, 0.08);
      z-index: 100;
      transform: translateX(100%);
      transition: transform 0.25s ease-out;
    }

    .agent-panel-overlay.visible {
      transform: translateX(0);
    }

    .agent-toggle-btn {
      position: fixed;
      top: 80px;
      right: 16px;
      z-index: 99;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--rre-accent);
      color: white;
      border: none;
      cursor: pointer;
      box-shadow: 0 2px 12px rgba(55, 138, 221, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .agent-toggle-btn:hover {
      background: var(--rre-accent-hover);
      box-shadow: 0 4px 16px rgba(55, 138, 221, 0.4);
    }

    .agent-toggle-btn.panel-open {
      right: 376px;
    }

    .agent-panel-header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      border-bottom: 0.5px solid var(--s-border);
    }

    .agent-panel-close {
      width: 28px;
      height: 28px;
      border: none;
      background: transparent;
      color: var(--s-text-tertiary);
      cursor: pointer;
      border-radius: var(--s-radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .agent-panel-close:hover {
      background: var(--s-surface-alt);
      color: var(--s-text);
    }

    .worksheet-header {
      background: var(--s-surface);
      border-bottom: 0.5px solid var(--s-border);
      padding: 16px 24px;
    }

    .header-row-1 {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .batch-name {
      font-size: 18px;
      font-weight: 500;
      flex: 1;
      border: none;
      background: transparent;
      font-family: inherit;
      color: var(--s-text);
      padding: 4px 8px;
      border-radius: var(--s-radius-sm);
      outline: none;
    }

    .batch-name:hover {
      background: var(--s-surface-hover);
    }

    .batch-name:focus {
      background: white;
      box-shadow: 0 0 0 2px var(--rre-accent-50);
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .s-btn {
      padding: 8px 16px;
      font-size: 13px;
      font-family: inherit;
      font-weight: 500;
      border-radius: var(--s-radius-md);
      cursor: pointer;
      border: 0.5px solid transparent;
      transition: all 0.12s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .s-btn-secondary {
      background: transparent;
      border-color: var(--s-border-strong);
      color: var(--s-text);
    }

    .s-btn-secondary:hover {
      background: var(--s-surface-alt);
    }

    .s-btn-primary {
      background: var(--rre-accent);
      color: #fff;
      border-color: var(--rre-accent);
    }

    .s-btn-primary:hover {
      background: var(--rre-accent-hover);
    }

    .s-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .header-row-2 {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      color: var(--s-text-secondary);
    }

    .header-meta {
      display: flex;
      gap: 16px;
    }

    .worksheet-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      background: var(--s-surface);
    }

    .filters-section {
      padding: 16px 24px;
      border-bottom: 0.5px solid var(--s-border);
    }

    .filter-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      background: var(--s-surface);
      border: 0.5px solid var(--s-border);
      border-radius: 999px;
      font-size: 12px;
      color: var(--s-text-secondary);
      cursor: pointer;
      transition: all 0.12s;
      font-family: inherit;
    }

    .filter-chip:hover {
      border-color: var(--s-border-strong);
      color: var(--s-text);
    }

    .filter-chip.active {
      background: var(--rre-accent-50);
      border-color: var(--rre-accent);
      color: var(--rre-accent-800);
      font-weight: 500;
    }

    .filter-toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 5px 12px;
      background: var(--s-surface);
      border: 0.5px solid var(--s-border);
      border-radius: 999px;
      font-size: 12px;
      color: var(--s-text-secondary);
      cursor: pointer;
      transition: all 0.12s;
      font-family: inherit;
    }

    .filter-toggle.active {
      background: var(--rre-accent-50);
      border-color: var(--rre-accent);
      color: var(--rre-accent-800);
      font-weight: 500;
    }

    .toggle-switch {
      width: 28px;
      height: 16px;
      background: var(--s-surface-hover);
      border-radius: 999px;
      position: relative;
      transition: background 0.15s;
      border: 0.5px solid var(--s-border);
    }

    .filter-toggle.active .toggle-switch {
      background: var(--rre-accent);
      border-color: var(--rre-accent);
    }

    .toggle-switch::after {
      content: "";
      position: absolute;
      top: 1px;
      left: 1px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: white;
      transition: transform 0.15s;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.15);
    }

    .filter-toggle.active .toggle-switch::after {
      transform: translateX(12px);
    }

    .filter-clear {
      margin-left: auto;
      font-size: 12px;
      color: var(--rre-accent);
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      font-weight: 500;
      font-family: inherit;
    }

    .filter-clear:hover {
      text-decoration: underline;
    }

    .table-container {
      flex: 1;
      overflow: auto;
      padding: 0 24px 24px;
    }

    .checkbox-cell {
      width: 40px;
      text-align: center;
    }

    .checkbox-cell input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    .product-cell {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 280px;
    }

    .product-thumb {
      width: 36px;
      height: 36px;
      border-radius: var(--s-radius-sm);
      background: var(--s-surface-alt);
      border: 0.5px solid var(--s-border);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--s-text-muted);
      font-size: 10px;
      font-weight: 600;
    }

    .product-info {
      flex: 1;
      min-width: 0;
    }

    .product-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--s-text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .product-variant {
      font-size: 11px;
      color: var(--s-text-tertiary);
    }

    .cost-cell {
      min-width: 140px;
    }

    .price-cell {
      min-width: 110px;
      font-variant-numeric: tabular-nums;
    }
    
    .price-cell.charm {
      font-weight: 600;
      color: var(--rre-accent-800);
    }

    .price-with-info {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .info-icon {
      width: 14px;
      height: 14px;
      color: var(--s-text-tertiary);
      cursor: help;
    }

    .info-icon:hover {
      color: var(--rre-accent);
    }

    .margin-cell {
      min-width: 100px;
    }

    .status-cell {
      min-width: 140px;
    }

    .strikethrough {
      text-decoration: line-through;
      opacity: 0.5;
    }

    .lock-icon {
      width: 12px;
      height: 12px;
      color: var(--s-text-tertiary);
      cursor: pointer;
    }

    .lock-icon:hover {
      color: var(--rre-accent);
    }

    .empty-state {
      padding: 80px 20px;
      text-align: center;
    }

    .empty-title {
      font-size: 15px;
      font-weight: 500;
      color: var(--s-text);
      margin-bottom: 6px;
    }

    .empty-text {
      font-size: 13px;
      color: var(--s-text-secondary);
    }
  </style>
</head>

      const [batchName, setBatchName] = useState("Cambios de 8 mayo 2026");

      const [showOnlyChanges, setShowOnlyChanges] = useState(false);
      const [agentPanelOpen, setAgentPanelOpen] = useState(false);
      const [activeFilters, setActiveFilters] = useState({
        category: new Set(),
        brand: new Set(),
        provider: new Set(),
        status: new Set()
      });

      const toggleRowSelection = (id) => {
        setSelectedRows(prev => {
          const next = new Set(prev);
          if (next.has(id)) {
            next.delete(id);
          } else {
            next.add(id);
          }
          return next;
        });
      };

      const toggleAllRows = () => {
        if (selectedRows.size === mockProducts.length) {
          setSelectedRows(new Set());
        } else {
          setSelectedRows(new Set(mockProducts.map(p => p.id)));
        }
      };

      const filteredProducts = useMemo(() => {
        return mockProducts.filter(product => {
          if (showOnlyChanges && product.currentCost === product.newCost && product.currentPrice === product.finalPrice) {
            return false;
          }
          return true;
        });
      }, [showOnlyChanges]);

      const violationCount = mockProducts.filter(p => p.status === 'warning' || p.status === 'critical').length;
      const criticalCount = mockProducts.filter(p => p.status === 'critical').length;
      const warningCount = mockProducts.filter(p => p.status === 'warning').length;

      return (
        <div className="app-shell">
          <button 
            className={`agent-toggle-btn ${agentPanelOpen ? 'panel-open' : ''}`}
            onClick={() => setAgentPanelOpen(!agentPanelOpen)}
            title="Observaciones del sistema"

                </div>
              </div>
              <div className="header-row-2">
                <div className="header-meta">
                  <span>Creado por <strong>Usuario Admin</strong></span>
                  <span>8 de mayo, 2026 · 14:30</span>
                  <span><strong>{mockProducts.length}</strong> productos</span>
                </div>
              </div>
            </div>

            <div className="worksheet-content">
              <div className="filters-section">
                <div className="filter-row">
                  <button className="filter-chip">
                    Categoría <span style={{marginLeft: '2px', opacity: 0.6}}>▼</span>
                  </button>
                  <button className="filter-chip">
                    Marca <span style={{marginLeft: '2px', opacity: 0.6}}>▼</span>
                  </button>
                  <button className="filter-chip">
                    Proveedor <span style={{marginLeft: '2px', opacity: 0.6}}>▼</span>
                  </button>
                  <button className="filter-chip">
                    Estado de regla <span style={{marginLeft: '2px', opacity: 0.6}}>▼</span>
                  </button>
                  <button 
                    className={`filter-toggle ${showOnlyChanges ? 'active' : ''}`}
                    onClick={() => setShowOnlyChanges(!showOnlyChanges)}
                  >
                    Solo cambios
                    <div className="toggle-switch"></div>
                  </button>
                  <button className="filter-clear">Limpiar filtros</button>
                </div>
              </div>

              {violationCount > 0 && (
                <div style={{padding: '0 24px', paddingTop: '16px'}}>
                  {criticalCount > 0 && (
                    <div className="pricing-banner critical">
                      <div className="pricing-banner-icon"><AlertIcon /></div>
                      <div className="pricing-banner-text">
                        <strong>{criticalCount} productos violan reglas de proveedor</strong> — {criticalCount} bajo MAP · 0 sobre precio máximo permitido
                      </div>
                      <div className="pricing-banner-actions">
                        <button className="pricing-banner-link">Ver solo estos</button>
                        <button className="pricing-banner-link">Solicitar autorización</button>
                      </div>
                    </div>
                  )}
                  {warningCount > 0 && (
                    <div className="pricing-banner warning" style={{marginTop: criticalCount > 0 ? '8px' : '0'}}>
                      <div className="pricing-banner-icon"><AlertIcon /></div>
                      <div className="pricing-banner-text">
                        <strong>{warningCount} productos requieren revisión</strong> — {warningCount} bajo margen objetivo
                      </div>
                      <div className="pricing-banner-actions">
                        <button className="pricing-banner-link">Ver solo estos</button>
                      </div>
                    </div>
                  )}
                </div>
              )}

              {selectedRows.size > 0 && (
                <div style={{padding: '0 24px', paddingTop: '16px'}}>
                  <div className="bulk-toolbar">
                    <div className="bulk-toolbar-count">{selectedRows.size} seleccionados</div>
                    <div className="bulk-toolbar-actions">
                      <button className="s-btn s-btn-secondary" style={{fontSize: '12px', padding: '6px 12px'}}>
                        Aumentar precio por %
                      </button>
                      <button className="s-btn s-btn-secondary" style={{fontSize: '12px', padding: '6px 12px'}}>
                        Aplicar precio gancho
                      </button>
                      <button className="s-btn s-btn-secondary" style={{fontSize: '12px', padding: '6px 12px'}}>
                        Restaurar precio actual
                      </button>
                    </div>
                  </div>
                </div>
              )}

              <div className="table-container">
                {filteredProducts.length === 0 ? (
                  <div className="empty-state">
                    <div className="empty-title">No hay productos en esta hoja</div>
                    <div className="empty-text">Aplica filtros o importa una lista de costos para empezar.</div>
                  </div>
                ) : (
                  <table className="pricing-table">
                    <thead>
                      <tr>
                        <th className="checkbox-cell">
                          <input
                            type="checkbox"
                            checked={selectedRows.size === mockProducts.length}
                            onChange={toggleAllRows}
                          />
                        </th>
                        <th>Producto</th>
                        <th>Costo actual → nuevo</th>
                        <th>Precio actual</th>
                        <th>Precio gancho</th>
                        <th>Precio final (manual)</th>
                        <th>Margen final</th>
                        <th>Estado</th>
                      </tr>
                    </thead>
                    <tbody>
                      {filteredProducts.map(product => {
                        const costChanged = product.currentCost !== product.newCost;
                        const priceChanged = product.currentPrice !== product.finalPrice;
                        const costDelta = ((product.newCost - product.currentCost) / product.currentCost * 100);
                        
                        return (
                          <tr
                            key={product.id}
                            className={product.status === 'warning' ? 'status-warning' : product.status === 'critical' ? 'status-critical' : ''}
                          >
                            <td className="checkbox-cell">
                              <input
                                type="checkbox"
                                checked={selectedRows.has(product.id)}
                                onChange={() => toggleRowSelection(product.id)}
                              />
                            </td>
                            <td>
                              <div className="product-cell">
                                <div className="product-thumb">{product.thumb}</div>
                                <div className="product-info">
                                  <div className="product-name">{product.name}</div>
                                  <div className="product-variant">{product.variant}</div>
                                  <div className="product-source">{product.brand} ({product.provider})</div>
                                </div>
                              </div>
                            </td>
                            <td className="cost-cell">
                              {costChanged ? (
                                <div className="cost-stack">
                                  <div>
                                    <span className="cost-current">Q{product.currentCost.toFixed(2)}</span>
                                    <span className="cost-arrow">→</span>
                                    <span className="cost-new">Q{product.newCost.toFixed(2)}</span>
                                  </div>
                                  <div className={`cost-delta ${costDelta > 0 ? 'positive' : 'negative'}`}>
                                    {costDelta > 0 ? '+' : ''}{costDelta.toFixed(1)}%
                                  </div>
                                </div>
                              ) : (
                                <span className="cost-current">Q{product.currentCost.toFixed(2)}</span>
                              )}
                            </td>
                            <td className="price-cell">Q{product.currentPrice.toFixed(2)}</td>
                            <td className="price-cell charm">
                              <div className="price-with-info">
                                <span>Q{product.charmPrice.toFixed(2)}</span>
                                <div className="info-icon">
                                  <InfoIcon />
                                </div>
                              </div>
                            </td>
                            <td className="price-cell">
                              {product.manualOverride ? (
                                <div className="price-with-info">
                                  <span style={{fontWeight: 500}}>Q{product.finalPrice.toFixed(2)}</span>
                                  <div className="lock-icon">
                                    <LockIcon />
                                  </div>
                                </div>
                              ) : (
                                <span style={{color: 'var(--s-text-muted)', fontSize: '12px'}}>—</span>
                              )}
                            </td>
                            <td className="margin-cell">
                              <div className={`margin-chip ${product.status}`}>
                                {product.margin.toFixed(1)}%
                              </div>
                            </td>
                            <td className="status-cell">
                              <div className={`s-status-pill ${product.status}`}>
                                {product.statusLabel}
                              </div>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<PriceWorksheet />);
  </script>
</body>
</html>
