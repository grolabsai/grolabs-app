<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proveedores — RRE</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="pricing-tokens.css">
  <style>
    :root {
      --rre-accent: #378ADD;
      --rre-accent-hover: #185FA5;
      --rre-accent-50: #E6F1FB;
      --rre-accent-600: #185FA5;
      --rre-accent-800: #0C447C;
      --s-bg: #FAFAF9;
      --s-surface: #FFFFFF;
      --s-surface-alt: #F5F5F4;
      --s-surface-hover: #EFEFEE;
      --s-border: rgba(0, 0, 0, 0.08);
      --s-border-strong: rgba(0, 0, 0, 0.16);
      --s-text: #1A1A1A;
      --s-text-secondary: #5F5E5A;
      --s-text-tertiary: #888780;
      --s-text-muted: #B4B2A9;
      --s-success: #1D9E75;
      --s-success-bg: #E1F5EE;
      --s-success-text: #085041;
      --s-danger: #A32D2D;
      --s-warning: #D97706;
      --s-warning-bg: #FEF3C7;
      --s-radius-sm: 6px;
      --s-radius-md: 8px;
      --s-radius-lg: 12px;
      --s-font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    html, body, #root {
      height: 100%;
      font-family: var(--s-font);
      font-size: 13px;
      color: var(--s-text);
      background: var(--s-bg);
      -webkit-font-smoothing: antialiased;
    }

    .page {
      max-width: 1400px;
      margin: 0 auto;
      padding: 32px 28px;
    }

    .page-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .page-title {
      font-size: 24px;
      font-weight: 500;
      margin-bottom: 6px;
    }

    .page-subtitle {
      font-size: 13px;
      color: var(--s-text-secondary);
    }

    .nav-tabs {
      display: flex;
      gap: 24px;
      border-bottom: 0.5px solid var(--s-border);
      margin-bottom: 28px;
    }

    .nav-tab {
      padding: 10px 0;
      font-size: 13px;
      color: var(--s-text-secondary);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      text-decoration: none;
      font-weight: 500;
    }

    .nav-tab:hover { color: var(--s-text); }
    .nav-tab.active {
      color: var(--rre-accent-800);
      border-bottom-color: var(--rre-accent);
    }

    .s-btn {
      padding: 8px 16px;
      font-size: 13px;
      font-family: inherit;
      font-weight: 500;
      border-radius: var(--s-radius-md);
      cursor: pointer;
      border: 0.5px solid transparent;
      transition: all 0.12s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      background: transparent;
      color: var(--s-text);
    }

    .s-btn-primary {
      background: var(--rre-accent);
      color: #fff;
      border-color: var(--rre-accent);
    }

    .s-btn-primary:hover {
      background: var(--rre-accent-hover);
    }

    .provider-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
    }

    .provider-card {
      background: var(--s-surface);
      border: 0.5px solid var(--s-border);
      border-radius: var(--s-radius-lg);
      padding: 18px 20px;
      cursor: pointer;
      transition: all 0.12s;
    }

    .provider-card:hover {
      border-color: var(--rre-accent);
      box-shadow: 0 2px 12px rgba(55, 138, 221, 0.1);
    }

    .provider-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }

    .provider-logo {
      width: 48px;
      height: 48px;
      border-radius: var(--s-radius-md);
      background: var(--rre-accent-50);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      color: var(--rre-accent-800);
      font-size: 16px;
      flex-shrink: 0;
    }

    .provider-info {
      flex: 1;
      min-width: 0;
    }

    .provider-name {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 2px;
    }

    .provider-meta {
      font-size: 12px;
      color: var(--s-text-tertiary);
    }

    .provider-brands {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 8px;
    }

    .brand-pill {
      display: inline-flex;
      padding: 3px 8px;
      background: var(--rre-accent-50);
      border: 0.5px solid var(--rre-accent);
      border-radius: 999px;
      font-size: 11px;
      font-weight: 500;
      color: var(--rre-accent-800);
    }

    .provider-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 0.5px solid var(--s-border);
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stat-label {
      font-size: 11px;
      color: var(--s-text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 500;
    }

    .stat-value {
      font-size: 15px;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    .stat-value.warning {
      color: var(--s-warning);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const Providers = () => {
      const providers = [
        {
          name: 'Distribuidora Pet Supplies S.A.',
          logo: 'DPS',
          brands: ['Royal Canin', 'Eukanuba'],
          products: 127,
          lastImport: '2 días',
          age: 2
        },
        {
          name: "Hill's Guatemala Importadora",
          logo: 'HG',
          brands: ["Hill's"],
          products: 89,
          lastImport: '5 días',
          age: 5
        },
        {
          name: 'Nestlé Purina Centroamérica',
          logo: 'NPC',
          brands: ['Purina', 'Fancy Feast'],
          products: 156,
          lastImport: '1 semana',
          age: 7
        },
        {
          name: 'Importadora Global Pet',
          logo: 'IGP',
          brands: ['Mars', 'Whiskas', 'Pedigree', 'Royal Canin'],
          products: 203,
          lastImport: '12 días',
          age: 12
        },
      ];

      return (
        <div className="page">
          <div className="page-header">
            <div>
              <h1 className="page-title">Proveedores</h1>
              <p className="page-subtitle">Gestionar listas de precios y reglas MAP</p>
            </div>
            <button className="s-btn s-btn-primary">+ Importar lista de precios</button>
          </div>

          <div className="nav-tabs">
            <a href="Pricing Overview.html" className="nav-tab">Resumen</a>
            <a href="Pricing Policies.html" className="nav-tab">Políticas</a>
            <a href="Providers.html" className="nav-tab active">Proveedores</a>
            <a href="Authorization Queue.html" className="nav-tab">Autorizaciones</a>
            <a href="Sync Status.html" className="nav-tab">Sincronización</a>
          </div>

          <div className="provider-grid">
            {providers.map((p, i) => (
              <div key={i} className="provider-card">
                <div className="provider-header">
                  <div className="provider-logo">{p.logo}</div>
                  <div className="provider-info">
                    <div className="provider-name">{p.name}</div>
                    <div className="provider-meta">{p.products} productos</div>
                    <div className="provider-brands">
                      {p.brands.map((brand, bi) => (
                        <div key={bi} className="brand-pill">{brand}</div>
                      ))}
                    </div>
                  </div>
                </div>
                <div className="provider-stats">
                  <div className="stat">
                    <div className="stat-label">Última importación</div>
                    <div className={`stat-value ${p.age > 7 ? 'warning' : ''}`}>Hace {p.lastImport}</div>
                  </div>
                  <div className="stat">
                    <div className="stat-label">Reglas MAP</div>
                    <div className="stat-value">Activas</div>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Providers />);
  </script>
</body>
</html>
