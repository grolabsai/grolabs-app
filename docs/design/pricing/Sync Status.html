<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estado de Sincronización — RRE</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="pricing-tokens.css">
  <style>
    :root {
      --rre-accent: #378ADD;
      --rre-accent-hover: #185FA5;
      --rre-accent-50: #E6F1FB;
      --rre-accent-600: #185FA5;
      --rre-accent-800: #0C447C;
      --s-bg: #FAFAF9;
      --s-surface: #FFFFFF;
      --s-surface-alt: #F5F5F4;
      --s-border: rgba(0, 0, 0, 0.08);
      --s-border-strong: rgba(0, 0, 0, 0.16);
      --s-text: #1A1A1A;
      --s-text-secondary: #5F5E5A;
      --s-text-tertiary: #888780;
      --s-text-muted: #B4B2A9;
      --s-success: #1D9E75;
      --s-success-bg: #E1F5EE;
      --s-success-text: #085041;
      --s-danger: #A32D2D;
      --s-danger-bg: #FCEBEB;
      --s-danger-text: #501313;
      --s-radius-sm: 6px;
      --s-radius-md: 8px;
      --s-radius-lg: 12px;
      --s-font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    html, body, #root {
      height: 100%;
      font-family: var(--s-font);
      font-size: 13px;
      color: var(--s-text);
      background: var(--s-bg);
      -webkit-font-smoothing: antialiased;
    }

    .page {
      max-width: 1400px;
      margin: 0 auto;
      padding: 32px 28px;
    }

    .page-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .page-title {
      font-size: 24px;
      font-weight: 500;
      margin-bottom: 6px;
    }

    .page-subtitle {
      font-size: 13px;
      color: var(--s-text-secondary);
    }

    .nav-tabs {
      display: flex;
      gap: 24px;
      border-bottom: 0.5px solid var(--s-border);
      margin-bottom: 28px;
    }

    .nav-tab {
      padding: 10px 0;
      font-size: 13px;
      color: var(--s-text-secondary);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      text-decoration: none;
      font-weight: 500;
    }

    .nav-tab:hover { color: var(--s-text); }
    .nav-tab.active {
      color: var(--rre-accent-800);
      border-bottom-color: var(--rre-accent);
    }

    .s-btn {
      padding: 8px 16px;
      font-size: 13px;
      font-family: inherit;
      font-weight: 500;
      border-radius: var(--s-radius-md);
      cursor: pointer;
      border: 0.5px solid transparent;
      transition: all 0.12s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: transparent;
    }

    .s-btn-primary {
      background: var(--rre-accent);
      color: #fff;
      border-color: var(--rre-accent);
    }

    .s-btn-primary:hover {
      background: var(--rre-accent-hover);
    }

    .s-card {
      background: var(--s-surface);
      border: 0.5px solid var(--s-border);
      border-radius: var(--s-radius-lg);
      padding: 20px 22px;
      margin-bottom: 16px;
    }

    .s-card-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .s-card-title {
      font-size: 16px;
      font-weight: 500;
    }

    .sync-status-bar {
      background: var(--s-success-bg);
      border-left: 3px solid var(--s-success);
      padding: 14px 16px;
      border-radius: var(--s-radius-md);
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .sync-status-text {
      flex: 1;
      font-size: 13px;
      font-weight: 500;
      color: var(--s-success-text);
    }

    .error-item {
      padding: 14px 16px;
      border-left: 3px solid var(--s-danger);
      background: var(--s-danger-bg);
      border-radius: var(--s-radius-md);
      margin-bottom: 8px;
    }

    .error-product {
      font-size: 13px;
      font-weight: 500;
      color: var(--s-danger-text);
      margin-bottom: 4px;
    }

    .error-message {
      font-size: 12px;
      color: var(--s-danger-text);
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const SyncStatus = () => {
      const errors = [
        {product: 'Royal Canin Adult 15kg', message: 'SKU no encontrado en WooCommerce'},
        {product: "Hill's Science Diet Puppy 3kg", message: 'Producto inactivo en tienda'},
        {product: 'Whiskas Senior 2kg', message: 'Error de conexión durante actualización'}
      ];

      return (
        <div className="page">
          <div className="page-header">
            <div>
              <h1 className="page-title">Sincronización con WooCommerce</h1>
              <p className="page-subtitle">Estado de precios y errores de sincronización</p>
            </div>
            <button className="s-btn s-btn-primary">Sincronizar ahora</button>
          </div>

          <div className="nav-tabs">
            <a href="Pricing Overview.html" className="nav-tab">Resumen</a>
            <a href="Pricing Policies.html" className="nav-tab">Políticas</a>
            <a href="Providers.html" className="nav-tab">Proveedores</a>
            <a href="Authorization Queue.html" className="nav-tab">Autorizaciones</a>
            <a href="Sync Status.html" className="nav-tab active">Sincronización</a>
          </div>

          <div className="sync-status-bar">
            <svg viewBox="0 0 20 20" fill="currentColor" style={{width: '20px', height: '20px', color: 'var(--s-success)'}}>
              <path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd" />
            </svg>
            <div className="sync-status-text">
              Última sincronización: <strong>Hace 2 horas</strong> · 187 productos actualizados
            </div>
          </div>

          <div className="s-card">
            <div className="s-card-header">
              <div className="s-card-title">Errores de sincronización ({errors.length})</div>
            </div>

            {errors.length === 0 ? (
              <div style={{textAlign: 'center', padding: '40px 20px', color: 'var(--s-text-tertiary)'}}>
                No hay errores de sincronización
              </div>
            ) : (
              errors.map((err, i) => (
                <div key={i} className="error-item">
                  <div className="error-product">{err.product}</div>
                  <div className="error-message">{err.message}</div>
                </div>
              ))
            )}
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<SyncStatus />);
  </script>
</body>
</html>
